<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment Confirmed</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 400px; margin: 50px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #27ae60; margin-bottom: 10px; }
        .ticket { background: #f9f9f9; border: 2px dashed #ccc; padding: 20px; margin: 20px 0; border-radius: 8px; }
        .ticket h2 { margin: 0 0 15px 0; color: #2c3e50; font-size: 40px; }
        .ticket p { margin: 5px 0; font-size: 18px; color: #555; }
        .back-btn { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #3498db; color: white; text-decoration: none; border-radius: 4px; }
        .back-btn:hover { background: #2980b9; }
    </style>
</head>
<body>

<div class="container">
    <h1>✅ Success!</h1>
    <p>Your appointment has been recorded.</p>
    
    <div class="ticket">
        <p>Your Serial Number:</p>
        <h2>#{{ serial }}</h2>
        <p><strong>Contact:</strong> {{ phone }}</p>
    </div>

    <a href="/" class="back-btn">Go back to Homepage</a>
</div>

</body>
</html>
