<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Appointment Booking</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        .info-box { background: #e8f4f8; padding: 15px; border-left: 4px solid #3498db; margin-bottom: 20px; font-size: 16px; color: #333; line-height: 1.6; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #219150; }
        .alert { background: #e74c3c; color: white; padding: 10px; border-radius: 4px; margin-bottom: 15px; text-align: center; }
        .admin-link { display: block; text-align: center; margin-top: 15px; font-size: 14px; color: #7f8c8d; text-decoration: none; }
        .admin-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <h1>Book an Appointment</h1>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="alert">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="info-box">
        <div>🩺 <strong>Doctor available on:</strong> {{ available_time }}</div>
        <div>📊 <strong>Total appointments recorded:</strong> {{ total }}</div>
    </div>

    <!-- Standard form submission pointing to the /book route -->
    <form action="/book" method="POST">
        <div class="form-group">
            <label for="date">Select Date:</label>
            <input type="date" id="date" name="date" required>
        </div>

        <div class="form-group">
            <label for="name">Patient Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter full name" required>
        </div>

        <div class="form-group">
            <label for="phone">Contact Number:</label>
            <input type="tel" id="phone" name="phone" placeholder="e.g. 1234567890" pattern="[0-9]{10,15}" title="Enter a valid phone number (10-15 digits)" required>
        </div>

        <button type="submit">Confirm Appointment</button>
    </form>

    <a href="/admin" class="admin-link">Doctor Login (Admin Portal)</a>
</div>

<script>
    // Automatically set the minimum date to today so patients can't pick past dates
    const dateInput = document.getElementById('date');
    dateInput.min = new Date().toISOString().split("T")[0];

    // Blocked dates passed from backend
    const blockedDates = {{ blocked_dates | tojson }};
    
    dateInput.addEventListener('change', function() {
        if (blockedDates.includes(this.value)) {
            alert('Sorry, the doctor is on leave or unavailable on this date. Please choose another date.');
            this.value = ''; // Reset the input to prevent submission
        }
    });
</script>

</body>
</html>
